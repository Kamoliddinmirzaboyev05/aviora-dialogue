services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ethical_dialogue}
      POSTGRES_USER: ${POSTGRES_USER:-ethical}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ethical} -d ${POSTGRES_DB:-ethical_dialogue}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file: .env
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
    env_file: .env
    command: celery -A config worker -l info
    depends_on:
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
    env_file: .env
    command: celery -A config beat -l info
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api/v1

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infrastructure/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
